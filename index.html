<style>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import{getFirestore,collection,doc,addDoc,deleteDoc,setDoc,getDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyDo8rCwU9JbHX72P7-l_8rj-Ut6o30m8y4",authDomain:"barca-d8ef7.firebaseapp.com",projectId:"barca-d8ef7",storageBucket:"barca-d8ef7.firebasestorage.app",messagingSenderId:"1002749213196",appId:"1:1002749213196:web:f9fffd82bd9c46439acc29"});
const db=getFirestore(app);

/* ‚îÄ‚îÄ DATA ‚îÄ‚îÄ */
const DM={"Byron|Eco del mare":4.2,"Byron|Golfo":3.1,"Byron|Mirabello/Spezia":3.9,"Byron|Rosse":1.5,"Byron|Tino":2.1,"Caletta|Byron":4.1,"Caletta|Castello":0.9,"Caletta|Diga":2,"Caletta|Eco del mare":0.7,"Caletta|Golfo":2,"Caletta|Lido":1.2,"Caletta|Mirabello/Spezia":4,"Caletta|Palmaria":3,"Caletta|Pozzale":3.3,"Caletta|Rosse":5.2,"Caletta|Tellaro":1.6,"Caletta|Tino":3.9,"Castello|Byron":3.7,"Castello|Eco del mare":0.9,"Castello|Golfo":2,"Castello|Mirabello/Spezia":3.6,"Castello|Pozzale":3.1,"Castello|Rosse":4.7,"Castello|Tellaro":1.4,"Castello|Tino":3.6,"Diga|Byron":3.5,"Diga|Castello":1.5,"Diga|Eco del mare":2.1,"Diga|Golfo":2.5,"Diga|Mirabello/Spezia":2.2,"Diga|Pozzale":3.4,"Diga|Rosse":4.4,"Diga|Tellaro":2.9,"Diga|Tino":4,"Eco del mare|Golfo":1.8,"Eco del mare|Mirabello/Spezia":4.3,"Eco del mare|Rosse":5.3,"Eco del mare|Tino":3.8,"Fiascherino|Byron":4.2,"Fiascherino|Caletta":0.7,"Fiascherino|Castello":1.2,"Fiascherino|Diga":2.4,"Fiascherino|Eco del mare":0.4,"Fiascherino|Golfo":1.7,"Fiascherino|Lido":1.6,"Fiascherino|Mirabello/Spezia":4.5,"Fiascherino|Palmaria":3.3,"Fiascherino|Porto Venere":3.6,"Fiascherino|Pozzale":3.6,"Fiascherino|Rosse":4.9,"Fiascherino|Tellaro":1.1,"Fiascherino|Tino":3.8,"Golfo|Mirabello/Spezia":4.5,"Golfo|Rosse":5.2,"Golfo|Tino":2.4,"Lerici|Byron":3.9,"Lerici|Caletta":1.3,"Lerici|Castello":0.7,"Lerici|Diga":1.4,"Lerici|Eco del mare":1.5,"Lerici|Fiascherino":1.6,"Lerici|Golfo":1.9,"Lerici|Lido":0.2,"Lerici|Mirabello/Spezia":3.3,"Lerici|Palmaria":3.5,"Lerici|Porto Lotti":2.7,"Lerici|Porto Venere":3.6,"Lerici|Pozzale":4,"Lerici|Rosse":4.9,"Lerici|Tellaro":2.1,"Lerici|Tino":4,"Lido|Byron":4.1,"Lido|Castello":0.9,"Lido|Diga":1.4,"Lido|Eco del mare":1.7,"Lido|Golfo":2.1,"Lido|Mirabello/Spezia":3.3,"Lido|Palmaria":3.7,"Lido|Pozzale":4.2,"Lido|Rosse":5.1,"Lido|Tellaro":2.3,"Lido|Tino":4.2,"Palmaria|Byron":1.9,"Palmaria|Castello":2.7,"Palmaria|Diga":2.7,"Palmaria|Eco del mare":3.1,"Palmaria|Golfo":2,"Palmaria|Mirabello/Spezia":3.1,"Palmaria|Pozzale":0.8,"Palmaria|Rosse":3,"Palmaria|Tellaro":3.5,"Palmaria|Tino":1.4,"Porto Lotti|Byron":3.9,"Porto Lotti|Caletta":3.3,"Porto Lotti|Castello":3,"Porto Lotti|Diga":1.4,"Porto Lotti|Eco del mare":3.6,"Porto Lotti|Fiascherino":3.8,"Porto Lotti|Golfo":4.5,"Porto Lotti|Lido":2.7,"Porto Lotti|Mirabello/Spezia":1.1,"Porto Lotti|Palmaria":3.4,"Porto Lotti|Porto Venere":3.6,"Porto Lotti|Pozzale":4,"Porto Lotti|Rosse":4.9,"Porto Lotti|Tellaro":4.1,"Porto Lotti|Tino":4.7,"Porto Venere|Byron":0.6,"Porto Venere|Caletta":3.6,"Porto Venere|Castello":3.3,"Porto Venere|Diga":2.9,"Porto Venere|Eco del mare":3.7,"Porto Venere|Golfo":2.9,"Porto Venere|Lido":3.4,"Porto Venere|Mirabello/Spezia":3.6,"Porto Venere|Palmaria":1.3,"Porto Venere|Pozzale":2,"Porto Venere|Rosse":1.6,"Porto Venere|Tellaro":4.4,"Porto Venere|Tino":2.5,"Pozzale|Byron":1.9,"Pozzale|Eco del mare":3.4,"Pozzale|Golfo":2.4,"Pozzale|Mirabello/Spezia":3.9,"Pozzale|Rosse":2.9,"Pozzale|Tino":0.9,"Rosse|Mirabello/Spezia":5,"Tellaro|Byron":3.7,"Tellaro|Eco del mare":1.1,"Tellaro|Golfo":1.5,"Tellaro|Mirabello/Spezia":4.9,"Tellaro|Pozzale":3.8,"Tellaro|Rosse":4.7,"Tellaro|Tino":4,"Tino|Mirabello/Spezia":4.5,"Tino|Rosse":3.4};
const CURVE=[[5,15],[10,30],[20,45],[30,55],[40,60]];
const BASE_LOCS=['Lerici','Porto Lotti','Porto Venere','Palmaria','Castello','Caletta','Fiascherino','Byron','Tino','Pozzale','Eco del mare','Diga','Tellaro','Golfo','Lido','Rosse','Mirabello/Spezia'];
const DEF_S={tankCapacity:350,currentFuel:137.2,defaultSpeed:25,timeCoeff:1.0,consConst:1.0,customRoutes:[],oilTypes:['Castrol 2T','Yamalube 2-M','Motul 600 2T','Mercury 2-Cycle','Other']};
const MODE={low:0.8,med:1.0,high:1.2};

/* ‚îÄ‚îÄ STATE ‚îÄ‚îÄ */
let S={...DEF_S},T=[],FR=[],COSTS=[],legs=[{from:'',to:'',distance:0,mode:'med'}],selYr='All',ready=0;

/* ‚îÄ‚îÄ HELPERS ‚îÄ‚îÄ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function td(){return new Date().toISOString().split('T')[0]}
function r(n,d){return Math.round(n*Math.pow(10,d||1))/Math.pow(10,d||1)}
function locs(){let l=[...BASE_LOCS];(S.customRoutes||[]).forEach(cr=>{if(!l.includes(cr.from))l.push(cr.from);if(!l.includes(cr.to))l.push(cr.to)});return l}
function getDist(f,t){if(!f||!t)return null;let cr=(S.customRoutes||[]).find(x=>(x.from===f&&x.to===t)||(x.from===t&&x.to===f));if(cr)return cr.distance;return DM[f+'|'+t]||DM[t+'|'+f]||null}
function cRate(kn){if(kn<=CURVE[0][0])return CURVE[0][1];if(kn>=CURVE[CURVE.length-1][0])return CURVE[CURVE.length-1][1];for(let i=0;i<CURVE.length-1;i++){if(kn>=CURVE[i][0]&&kn<=CURVE[i+1][0]){let t=(kn-CURVE[i][0])/(CURVE[i+1][0]-CURVE[i][0]);return CURVE[i][1]+t*(CURVE[i+1][1]-CURVE[i][1])}}return 60}
function calcLeg(d,s,m){let tc=S.timeCoeff||1,cc=S.consConst||1;let h=s>0?(d/s)*tc:0;let c=h*cRate(s)*(MODE[m]||1)*cc;return{hours:r(h,3),consumption:r(c,2)}}
function lo(s){return '<option value="">Select</option>'+locs().map(l=>'<option value="'+esc(l)+'"'+(s===l?' selected':'')+'>'+esc(l)+'</option>').join('')}
function fYr(arr){return selYr==='All'?arr:arr.filter(x=>(x.date||'').startsWith(selYr))}
function rLabel(t){if(t.legs&&t.legs.length>1)return t.legs.map(l=>l.from).concat(t.legs[t.legs.length-1].to).join(' ‚Üí ');return(t.from||'')+(t.to?' ‚Üí '+t.to:'')}
function fp(){return Math.min(100,Math.max(0,Math.round(S.currentFuel/S.tankCapacity*100)))}
function fc(){let p=fp();return p>50?'var(--bl)':p>25?'var(--am)':'var(--rd)'}
function sb(st){let e=document.getElementById('syncB');if(!e)return;e.className='sync '+st;e.textContent=st==='ok'?'‚òÅÔ∏è Synced':'‚è≥ Loading...'}

/* ‚îÄ‚îÄ FIREBASE LISTENERS ‚îÄ‚îÄ */
onSnapshot(doc(db,'settings','main'),s=>{if(s.exists())S={...DEF_S,...s.data()};ready|=1;if(ready===15){sb('ok');render()}},{});
onSnapshot(collection(db,'trips'),s=>{T=s.docs.map(d=>({_id:d.id,...d.data()}));T.sort((a,b)=>(b.date||'').localeCompare(a.date||''));ready|=2;if(ready===15){sb('ok');render()}},{});
onSnapshot(collection(db,'fuelRefuels'),s=>{FR=s.docs.map(d=>({_id:d.id,...d.data()}));FR.sort((a,b)=>(b.date||'').localeCompare(a.date||''));ready|=4;if(ready===15){sb('ok');render()}},{});
onSnapshot(collection(db,'costs'),s=>{COSTS=s.docs.map(d=>({_id:d.id,...d.data()}));COSTS.sort((a,b)=>(b.date||'').localeCompare(a.date||''));ready|=8;if(ready===15){sb('ok');render()}},{});

/* ‚îÄ‚îÄ TAB NAV ‚îÄ‚îÄ */
window.go=(id,btn)=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.getElementById('t-'+id).classList.add('on');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.querySelector('.cnt').scrollTop=0;render()};
window.pickYr=(yr,btn)=>{selYr=yr;document.querySelectorAll('.yr-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()};

/* ‚îÄ‚îÄ MASTER RENDER ‚îÄ‚îÄ */
function render(){if(ready<15)return;rDash();rReg();rFuel();rHist();rCosts();rSet()}

/* ‚îÄ‚îÄ 1. DASHBOARD ‚îÄ‚îÄ */
function rDash(){
let ft=fYr(T),ff=fYr(FR),p=fp(),c=fc(),da=377-377*p/100;
let fU=r(ft.reduce((s,t)=>s+(t.consumption||0),0));
let mi=r(ft.reduce((s,t)=>s+(t.distance||0),0));
let fCost=r(ff.reduce((s,x)=>s+(x.fuelCost||0),0));
let totalLit=ff.reduce((s,x)=>s+(x.fuelLiters||0),0);
let avgPrice=totalLit>0?r(fCost/totalLit,2):0;
let fuelSpent=r(fU*avgPrice,2);
let yrs=new Set();T.forEach(t=>{if(t.date)yrs.add(t.date.substring(0,4))});FR.forEach(f=>{if(f.date)yrs.add(f.date.substring(0,4))});COSTS.forEach(c=>{if(c.date)yrs.add(c.date.substring(0,4))});
let ys=Array.from(yrs).sort().reverse();
let h='<div class="yr-row"><button class="yr-btn'+(selYr==='All'?' on':'')+'" onclick="pickYr(\'All\',this)">All</button>';
ys.forEach(y=>{h+='<button class="yr-btn'+(selYr===y?' on':'')+'" onclick="pickYr(\''+y+'\',this)">'+y+'</button>'});h+='</div>';
h+='<div class="gauge"><div class="lbl">Fuel level</div><div class="ring"><svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="60" fill="none" stroke="#e8e8ea" stroke-width="9"/><circle cx="70" cy="70" r="60" fill="none" stroke="'+c+'" stroke-width="9" stroke-dasharray="377" stroke-dashoffset="'+da+'" stroke-linecap="round"/></svg><div class="v">'+Math.round(S.currentFuel)+'</div><div class="u">liters of '+S.tankCapacity+'</div><div class="p">'+p+'%</div></div><div class="bar"><div class="fill" style="width:'+p+'%;background:'+c+'"></div></div></div>';
h+='<div class="sg"><div class="sc"><div class="sl">Trips</div><div class="sv">'+ft.length+'</div></div><div class="sc"><div class="sl">Fuel consumed</div><div class="sv">'+fU+' L</div></div><div class="sc"><div class="sl">Avg fuel price</div><div class="sv" style="color:var(--bl)">‚Ç¨'+avgPrice+'</div></div><div class="sc"><div class="sl">Total miles</div><div class="sv" style="color:var(--am)">'+mi+'</div></div></div>';
h+='<div class="tb"><div><div class="tl">Fuel spending</div><div class="tv">‚Ç¨'+fuelSpent+'</div><div class="td">'+fU+'L √ó ‚Ç¨'+avgPrice+'/L</div></div><div style="text-align:right"><div style="font-size:11px;opacity:.7">Avg/trip</div><div style="font-size:18px;font-weight:600">‚Ç¨'+(ft.length>0?r(fuelSpent/ft.length,2):0)+'</div></div></div>';
let all=[].concat(ft.map(t=>({tp:'t',date:t.date,d:t})),ff.map(x=>({tp:'f',date:x.date,d:x})),fYr(COSTS).map(c=>({tp:'c',date:c.date,d:c}))).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,10);
h+='<div class="sh">Recent activity</div><div class="al">';
if(!all.length)h+='<div class="empty">No activity yet</div>';
all.forEach(item=>{let d=item.d;
if(item.tp==='t')h+='<div class="ai"><div class="ai-top"><div class="at">'+esc(rLabel(d))+'</div><button class="del" onclick="delTrip(\''+d._id+'\','+d.consumption+')">‚úï</button></div><div class="am2">'+d.date+' ¬∑ '+(d.speed||0)+' kn ¬∑ '+(d.distance||0)+' mi</div><div class="aa c">‚àí'+d.consumption+' L</div></div>';
if(item.tp==='f')h+='<div class="ai"><div class="ai-top"><div class="at">‚õΩ Refuel'+(d.location?' @ '+esc(d.location):'')+'</div><button class="del" onclick="delFuel(\''+d._id+'\','+d.fuelLiters+')">‚úï</button></div><div class="am2">'+d.date+' ¬∑ '+d.fuelLiters+'L ¬∑ ‚Ç¨'+d.fuelPrice+'/L</div><div class="aa a">+'+d.fuelLiters+' L ¬∑ ‚Ç¨'+r((d.fuelCost||0)+(d.oilCost||0))+'</div></div>';
if(item.tp==='c')h+='<div class="ai"><div class="ai-top"><div class="at">üí∞ '+esc(d.description)+'</div><button class="del" onclick="delCost(\''+d._id+'\')">‚úï</button></div><div class="am2">'+d.date+'</div><div class="aa" style="color:#7C3AED">‚Ç¨'+d.amount+'</div></div>';
});h+='</div>';document.getElementById('t-dash').innerHTML=h}

/* ‚îÄ‚îÄ 2. TRIP REGISTRATION ‚îÄ‚îÄ */
function rReg(){
let totalDist=r(legs.reduce((s,l)=>s+(l.distance||0),0));
let chain=legs.filter(l=>l.from).map(l=>l.from);if(legs.length&&legs[legs.length-1].to)chain.push(legs[legs.length-1].to);
let h='<div class="fc"><div class="sh" style="margin-top:0">‚úà Log a trip</div>';
h+='<div class="fg"><label>Date</label><input type="date" id="trD" value="'+td()+'"></div>';
h+='<label style="display:block;font-size:12px;font-weight:500;margin-bottom:6px;color:#555">Route legs</label>';
legs.forEach((leg,i)=>{
let d=getDist(leg.from,leg.to);
h+='<div class="lc"><div class="lh"><span class="ln">Leg '+(i+1)+'</span>'+(legs.length>1?'<button class="del" onclick="rmLeg('+i+')">‚úï</button>':'')+'</div>';
h+='<div class="lr"><select class="ls" onchange="uLeg('+i+',\'from\',this.value)">'+lo(leg.from)+'</select><span class="la">‚Üí</span><select class="ls" onchange="uLeg('+i+',\'to\',this.value)">'+lo(leg.to)+'</select></div>';
h+='<div class="ld"><input class="ldi" value="'+(d!==null?d:'')+'" disabled placeholder="Select route"><span class="lm">mi</span></div>';
h+='<div class="mr"><button class="mb'+(leg.mode==='low'?' on':'')+'" onclick="uLeg('+i+',\'mode\',\'low\')">‚ñºLow</button><button class="mb'+(leg.mode==='med'?' on':'')+'" onclick="uLeg('+i+',\'mode\',\'med\')">‚óèMed</button><button class="mb'+(leg.mode==='high'?' on':'')+'" onclick="uLeg('+i+',\'mode\',\'high\')">‚ñ≤High</button></div></div>'});
h+='<button class="bal" onclick="addLeg()">+ Add destination</button>';
if(chain.length>1)h+='<div class="ts2"><div class="r">'+chain.map(esc).join(' ‚Üí ')+'</div><div class="d">Total: '+totalDist+' mi</div></div>';
h+='<div class="fg"><label>Average speed (knots)</label><input type="number" step="1" id="trS" value="'+(S.defaultSpeed||25)+'" oninput="uCalc()"></div>';
h+='<div id="tCalc"></div>';
h+='<div class="cv2">Curve: 5kn‚Üí15 ¬∑ 10kn‚Üí30 ¬∑ 20kn‚Üí45 ¬∑ 30kn‚Üí55 ¬∑ 40kn‚Üí60 L/h</div>';
h+='<div class="fg"><label>Notes</label><textarea id="trN" placeholder="Optional notes..."></textarea></div>';
h+='<button class="btn bb" onclick="doTrip()">Log trip</button></div>';
document.getElementById('t-reg').innerHTML=h;uCalc()}

window.uCalc=()=>{let spd=parseFloat((document.getElementById('trS')||{}).value)||0;let el=document.getElementById('tCalc');if(!el)return;if(!spd){el.innerHTML='';return}
let totalC=0,totalH=0,html='<div class="calc">';
legs.forEach((l,i)=>{let d=l.distance||0;if(!d||!l.from||!l.to)return;let c=calcLeg(d,spd,l.mode);totalC+=c.consumption;totalH+=c.hours;
html+='<b>Leg '+(i+1)+':</b> '+esc(l.from)+'‚Üí'+esc(l.to)+' ¬∑ '+d+'mi ¬∑ '+c.hours+'h = <b>'+c.consumption+'L</b><br>'});
html+='<br><b>Total:</b> '+r(totalH,2)+'h ¬∑ <b>'+r(totalC)+'L</b></div>';
el.innerHTML=legs.some(l=>l.from&&l.to&&l.distance>0)?html:''};

window.uLeg=(i,f,v)=>{legs[i][f]=v;if(f==='from'||f==='to'){let d=getDist(legs[i].from,legs[i].to);legs[i].distance=d||0}rReg()};
window.addLeg=()=>{let last=legs[legs.length-1];legs.push({from:last?last.to:'',to:'',distance:0,mode:'med'});rReg()};
window.rmLeg=i=>{if(legs.length<=1)return;legs.splice(i,1);rReg()};

/* ‚îÄ‚îÄ 3. FUEL ‚îÄ‚îÄ */
function rFuel(){
let ff=FR,fLit=r(ff.reduce((s,x)=>s+x.fuelLiters,0)),oLit=r(ff.reduce((s,x)=>s+(x.oilLiters||0),0)),fCost=r(ff.reduce((s,x)=>s+(x.fuelCost||0),0)),oCost=r(ff.reduce((s,x)=>s+(x.oilCost||0),0));
let ots=(S.oilTypes||[]).map(t=>'<option value="'+esc(t)+'">'+esc(t)+'</option>').join('');
let h='<div class="fc"><div class="sh" style="margin-top:0">‚õΩ Fuel refueling</div>';
h+='<div class="fg"><label>Date</label><input type="date" id="fD" value="'+td()+'"></div>';
h+='<div class="fg"><label>Location</label><select id="fLoc">'+lo('')+'</select></div>';
h+='<div class="fg"><label>Fuel liters</label><input type="number" step="0.1" id="fLit" placeholder="150"></div>';
h+='<div class="fg"><label>Price/liter (‚Ç¨)</label><input type="number" step="0.01" id="fPr" placeholder="2.30"></div>';
h+='<div style="background:var(--am-l);padding:12px;border-radius:8px;margin-bottom:12px;border-left:3px solid var(--am)"><div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--am)">üõ¢Ô∏è Oil</div>';
h+='<div class="fg" style="margin-bottom:8px"><label>Oil liters</label><input type="number" step="0.1" id="oLit" placeholder="0"></div>';
h+='<div class="fg" style="margin-bottom:8px"><label>Oil cost/liter (‚Ç¨)</label><input type="number" step="0.01" id="oPr" placeholder="12.50"></div>';
h+='<div class="fg" style="margin-bottom:0"><label>Oil type</label><select id="oTy"><option value="">None</option>'+ots+'</select></div></div>';
h+='<button class="btn bg2" onclick="doFuel()">Add refueling</button></div>';
h+='<div class="sh">Refueling stats</div>';
h+='<div class="sg"><div class="sc"><div class="sl">Total fuel</div><div class="sv">'+fLit+' L</div></div><div class="sc"><div class="sl">Total oil</div><div class="sv">'+oLit+' L</div></div><div class="sc"><div class="sl">Fuel cost</div><div class="sv" style="color:var(--bl)">‚Ç¨'+fCost+'</div></div><div class="sc"><div class="sl">Oil cost</div><div class="sv" style="color:var(--am)">‚Ç¨'+oCost+'</div></div></div>';
h+='<div class="sh">History</div>';
if(!ff.length)h+='<div class="empty">No refueling yet</div>';
ff.forEach(x=>{let oil=x.oilLiters?' + '+x.oilLiters+'L oil':'';let loc=x.location?' @ '+esc(x.location):'';let ot=x.oilType?' ¬∑ '+esc(x.oilType):'';
h+='<div class="ai"><div class="ai-top"><div class="at">‚õΩ '+x.fuelLiters+'L fuel'+oil+loc+'</div><button class="del" onclick="delFuel(\''+x._id+'\','+x.fuelLiters+')">‚úï</button></div><div class="am2">'+x.date+' ¬∑ ‚Ç¨'+x.fuelPrice+'/L'+ot+'</div><div class="aa a">‚Ç¨'+r((x.fuelCost||0)+(x.oilCost||0))+'</div></div>'});
document.getElementById('t-fuel').innerHTML=h}

/* ‚îÄ‚îÄ 4. HISTORY TRIP ‚îÄ‚îÄ */
function rHist(){
let dates={};T.forEach(t=>{if(!dates[t.date])dates[t.date]=[];dates[t.date].push(t)});
let sd=Object.keys(dates).sort((a,b)=>b.localeCompare(a));
let h='<div class="sh" style="margin-top:0">Trips by day</div>';
h+='<button class="btn bg2" onclick="expHist()" style="margin-bottom:12px">üì• Export History to CSV</button>';
if(!sd.length)h+='<div class="empty">No trips yet</div>';
sd.forEach(date=>{let tr=dates[date];let dd=r(tr.reduce((s,t)=>s+(t.distance||0),0));let df=r(tr.reduce((s,t)=>s+(t.consumption||0),0));
h+='<div class="dg"><div class="dg-d">'+date+' ‚Äî '+dd+' mi ¬∑ '+df+' L</div>';
tr.forEach(t=>{h+='<div class="dg-i"><div><div class="dg-r">'+esc(rLabel(t))+'</div><div class="dg-m">'+(t.hours||0)+'h ¬∑ '+(t.distance||0)+' mi ¬∑ '+t.consumption+'L'+(t.notes?' ¬∑ '+esc(t.notes):'')+'</div></div><div style="display:flex;align-items:center;gap:6px"><span class="dg-c">‚àí'+t.consumption+'L</span><button class="del" onclick="delTrip(\''+t._id+'\','+t.consumption+')">‚úï</button></div></div>'});h+='</div>'});
h+='<div style="background:var(--bl-l);padding:12px;border-radius:0;border-left:3px solid var(--bl);margin-top:12px"><div style="font-size:11px;color:var(--mt)">Total: '+T.length+' trips ¬∑ '+r(T.reduce((s,t)=>s+(t.distance||0),0))+' mi</div><div style="font-size:16px;font-weight:600;margin-top:2px">'+r(T.reduce((s,t)=>s+(t.consumption||0),0))+' L consumed</div></div>';
document.getElementById('t-hist').innerHTML=h}

/* ‚îÄ‚îÄ 5. FIXED COSTS ‚îÄ‚îÄ */
function rCosts(){
let cc=fYr(COSTS);let yrs=new Set();COSTS.forEach(c=>{if(c.date)yrs.add(c.date.substring(0,4))});
let ys=Array.from(yrs).sort().reverse();
let tot=r(cc.reduce((s,c)=>s+(parseFloat(c.amount)||0),0),2);
let h='<div class="yr-row"><button class="yr-btn'+(selYr==='All'?' on':'')+'" onclick="pickYr(\'All\',this)">All</button>';
ys.forEach(y=>{h+='<button class="yr-btn'+(selYr===y?' on':'')+'" onclick="pickYr(\''+y+'\',this)">'+y+'</button>'});h+='</div>';
h+='<div class="cost-total"><div><div style="font-size:12px;opacity:.85">Fixed costs total</div><div class="ctv">‚Ç¨'+tot+'</div></div><div style="text-align:right"><div style="font-size:11px;opacity:.7">Entries</div><div style="font-size:18px;font-weight:600">'+cc.length+'</div></div></div>';
h+='<div class="fc"><div class="sh" style="margin-top:0">üí∞ Add cost</div>';
h+='<div class="fg"><label>Date</label><input type="date" id="cD" value="'+td()+'"></div>';
h+='<div class="fg"><label>Description</label><textarea id="cDesc" placeholder="Moorage, insurance..."></textarea></div>';
h+='<div class="fg"><label>Amount (‚Ç¨)</label><input type="number" step="0.01" id="cAmt" placeholder="0.00"></div>';
h+='<button class="btn bp" onclick="doCost()">Add cost</button></div>';
if(!cc.length)h+='<div class="empty">No costs yet</div>';
cc.forEach(c=>{h+='<div class="ai"><div class="ai-top"><div class="at">'+esc(c.description)+'</div><button class="del" onclick="delCost(\''+c._id+'\')">‚úï</button></div><div class="am2">'+c.date+'</div><div class="aa" style="color:#7C3AED;font-size:15px;font-weight:600">‚Ç¨'+c.amount+'</div></div>'});
document.getElementById('t-costs').innerHTML=h}

/* ‚îÄ‚îÄ 6. SETTINGS ‚îÄ‚îÄ */
function rSet(){
let cr=S.customRoutes||[];
let h='<div class="fc"><div class="sh" style="margin-top:0">New trip/leg</div><p style="font-size:12px;color:var(--mt);margin-bottom:12px;line-height:1.4">Add new route combinations and distances.</p>';
h+='<div style="background:#f9f9f9;border:1px solid #e0e0e0;border-radius:8px;padding:10px;margin-bottom:12px"><div class="lr"><input type="text" id="crF" placeholder="From" style="flex:1;padding:7px 9px;border:1px solid #ddd;border-radius:6px;font-size:13px"><span class="la">‚Üí</span><input type="text" id="crT" placeholder="To" style="flex:1;padding:7px 9px;border:1px solid #ddd;border-radius:6px;font-size:13px"></div><div class="lr"><input type="number" step="0.1" id="crD" placeholder="Miles" style="flex:1;padding:7px 9px;border:1px solid #ddd;border-radius:6px;font-size:13px"><button style="padding:7px 14px;background:var(--bl);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer" onclick="addCR()">Add</button></div></div>';
h+='<div class="sh" style="margin-top:0">Custom routes ('+cr.length+')</div>';
if(!cr.length)h+='<div class="empty">No custom routes</div>';
cr.forEach((x,i)=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:6px;margin-bottom:5px;font-size:12px"><span style="font-weight:500">'+esc(x.from)+' ‚Üí '+esc(x.to)+'</span><span style="color:var(--bl);font-weight:500;margin:0 8px">'+x.distance+' mi</span><button class="del" onclick="delCR('+i+')">‚úï</button></div>'});
h+='<div class="sh">Boat parameters</div>';
h+='<div class="fg"><label>Tank capacity (L)</label><input type="number" id="sCap" value="'+S.tankCapacity+'"></div>';
h+='<div class="fg"><label>Current fuel (L)</label><input type="number" step="0.1" id="sFuel" value="'+r(S.currentFuel,1)+'"></div>';
h+='<div class="fg"><label>Default speed (knots)</label><input type="number" step="1" id="sSpd" value="'+(S.defaultSpeed||25)+'"></div>';
h+='<div style="background:var(--am-l);padding:12px;border-radius:8px;margin:14px 0;border-left:3px solid var(--am)"><div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--am)">Calculation parameters</div>';
h+='<div class="fg"><label>Time coefficient</label><input type="number" step="0.01" id="sTc" value="'+(S.timeCoeff||1)+'"></div>';
h+='<div class="fg" style="margin-bottom:0"><label>Consumption constant</label><input type="number" step="0.01" id="sCc" value="'+(S.consConst||1)+'"></div></div>';
h+='<div style="display:flex;gap:8px"><button class="btn bb" onclick="doSave()" style="flex:1">Save settings</button><button class="btn bg2" onclick="expJ()" style="flex:1">üì• Export JSON</button></div></div>';
document.getElementById('t-set').innerHTML=h}

/* ‚îÄ‚îÄ ACTIONS ‚îÄ‚îÄ */
async function savS(){await setDoc(doc(db,'settings','main'),S);sb('ok')}

window.doTrip=async()=>{let vl=legs.filter(l=>l.from&&l.to&&l.distance>0);let spd=parseFloat(document.getElementById('trS').value);if(!vl.length)return alert('Add at least one complete leg');if(!spd)return alert('Enter speed');
let totalD=0,totalC=0,totalH=0;let sl=vl.map(l=>{let c=calcLeg(l.distance,spd,l.mode);totalD+=l.distance;totalC+=c.consumption;totalH+=c.hours;return{from:l.from,to:l.to,distance:l.distance,mode:l.mode,consumption:c.consumption}});
await addDoc(collection(db,'trips'),{date:document.getElementById('trD').value,legs:sl,from:vl[0].from,to:vl[vl.length-1].to,distance:r(totalD),speed:spd,hours:r(totalH,2),consumption:r(totalC),notes:document.getElementById('trN').value});
S.currentFuel=Math.max(0,S.currentFuel-r(totalC));await savS();legs=[{from:'',to:'',distance:0,mode:'med'}]};

window.doFuel=async()=>{let fl=parseFloat(document.getElementById('fLit').value),fp=parseFloat(document.getElementById('fPr').value);if(!fl||!fp)return alert('Fill fuel liters and price');
let ol=parseFloat(document.getElementById('oLit').value)||0,op=parseFloat(document.getElementById('oPr').value)||0;
await addDoc(collection(db,'fuelRefuels'),{date:document.getElementById('fD').value,location:document.getElementById('fLoc').value,fuelLiters:fl,fuelPrice:fp,fuelCost:r(fl*fp,2),oilLiters:ol,oilPrice:op,oilCost:r(ol*op,2),oilType:document.getElementById('oTy').value});
S.currentFuel=Math.min(S.tankCapacity,S.currentFuel+fl);await savS()};

window.doCost=async()=>{let d=document.getElementById('cDesc').value.trim(),a=parseFloat(document.getElementById('cAmt').value);if(!d||!a)return alert('Fill description and amount');await addDoc(collection(db,'costs'),{date:document.getElementById('cD').value,description:d,amount:a})};

window.delTrip=async(id,con)=>{if(!confirm('Delete trip and restore '+con+'L?'))return;await deleteDoc(doc(db,'trips',id));S.currentFuel=Math.min(S.tankCapacity,S.currentFuel+con);await savS()};
window.delFuel=async(id,lit)=>{if(!confirm('Delete refueling?'))return;await deleteDoc(doc(db,'fuelRefuels',id));S.currentFuel=Math.max(0,S.currentFuel-lit);await savS()};
window.delCost=async id=>{if(!confirm('Delete cost?'))return;await deleteDoc(doc(db,'costs',id))};

window.doSave=async()=>{S.tankCapacity=parseFloat(document.getElementById('sCap').value);S.currentFuel=parseFloat(document.getElementById('sFuel').value);S.defaultSpeed=parseFloat(document.getElementById('sSpd').value)||25;S.timeCoeff=parseFloat(document.getElementById('sTc').value)||1;S.consConst=parseFloat(document.getElementById('sCc').value)||1;await savS();alert('Saved!')};

window.addCR=async()=>{let f=document.getElementById('crF').value.trim(),t=document.getElementById('crT').value.trim(),d=parseFloat(document.getElementById('crD').value);if(!f||!t||!d)return alert('Fill from, to, distance');if(!S.customRoutes)S.customRoutes=[];S.customRoutes.push({from:f,to:t,distance:d});await savS()};
window.delCR=async i=>{S.customRoutes.splice(i,1);await savS()};

window.expJ=()=>{let d=JSON.stringify({exportDate:new Date().toISOString(),settings:S,trips:T,fuelRefuels:FR,costs:COSTS},null,2);dlf(d,'application/json','barca-'+td()+'.json')};
window.expHist=()=>{let l=['Date,From,To,Hours,Distance (mi),Consumption (L),Notes'];T.forEach(t=>{l.push(t.date+','+esc(t.from)+','+esc(t.to)+','+(t.hours||0)+','+(t.distance||0)+','+t.consumption+',"'+(t.notes||'').replace(/"/g,'""')+'"')});dlf(l.join('\n'),'text/csv','barca-history-'+td()+'.csv')};
function dlf(t,tp,n){let b=new Blob([t],{type:tp});let u=URL.createObjectURL(b);let a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}

getDoc(doc(db,'settings','main')).then(s=>{if(!s.exists())setDoc(doc(db,'settings','main'),DEF_S)});
</script>
